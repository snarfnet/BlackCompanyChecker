name: Prepare ASC Metadata

on:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Fill required App Store Connect metadata
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
          ASC_KEY_ID: WDXGY9WX55
          ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
          APP_ID: "6773001121"
          APP_VERSION: "1.0"
          TARGET_PRICE_JPY: "100"
          PREPARE_APP_ONLY: "1"
        run: |
          pip3 install "pyjwt[crypto]" requests --quiet --break-system-packages 2>/dev/null || pip3 install "pyjwt[crypto]" requests --quiet
          python3 scripts/submit_production.py
