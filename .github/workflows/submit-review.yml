name: Submit App Review

on:
  workflow_dispatch:

jobs:
  submit:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Generate App Store screenshots
        run: |
          npm install --no-save playwright
          npx playwright install chromium
          node screenshots/capture.js

      - name: Submit latest build for App Review
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
          ASC_KEY_ID: WDXGY9WX55
          ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
          APP_ID: "6773001121"
          APP_VERSION: "1.0"
          TARGET_PRICE_JPY: "100"
        run: |
          pip3 install "pyjwt[crypto]" requests --quiet --break-system-packages 2>/dev/null || pip3 install "pyjwt[crypto]" requests --quiet
          python3 scripts/submit_production.py
