<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BlackCompanyChecker Screenshots</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; width: 100%; height: 100%; background: #0b1220; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; }
  body { overflow: hidden; }
  .canvas { width: 100vw; height: 100vh; display: grid; place-items: center; background:
    radial-gradient(circle at 15% 8%, rgba(56, 189, 248, .28), transparent 30%),
    radial-gradient(circle at 92% 20%, rgba(245, 158, 11, .20), transparent 28%),
    linear-gradient(135deg, #07111f 0%, #10243e 48%, #08111d 100%);
    color: #f8fafc; position: relative; padding: 5.4%;
  }
  .stage { width: 100%; height: 100%; display: grid; grid-template-columns: 1fr 1.06fr; align-items: center; gap: 5%; }
  .copy { align-self: center; max-width: 880px; }
  .label { color: #67e8f9; font-size: clamp(30px, 2.4vw, 56px); font-weight: 800; letter-spacing: 0; margin-bottom: 28px; }
  h1 { font-size: clamp(74px, 6.8vw, 154px); line-height: 1.02; letter-spacing: 0; margin: 0 0 34px; }
  .lead { color: #dbeafe; font-size: clamp(30px, 2.4vw, 58px); line-height: 1.45; font-weight: 650; margin: 0; }
  .phone { justify-self: center; width: min(92%, 620px); aspect-ratio: 430 / 932; border-radius: 64px; background: #f8fafc; padding: 26px; box-shadow: 0 42px 120px rgba(0,0,0,.48); color: #111827; position: relative; }
  .phone-inner { height: 100%; border-radius: 44px; background: #f7f8fb; overflow: hidden; position: relative; }
  .status { height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 34px; font-weight: 800; color: #0f172a; font-size: 18px; }
  .app { padding: 16px 28px 34px; height: calc(100% - 64px); overflow: hidden; }
  .hero-card { background: linear-gradient(135deg, #0f2b4d, #163d67); color: white; border-radius: 28px; padding: 34px; box-shadow: 0 16px 42px rgba(15, 43, 77, .26); }
  .app-title { font-size: 34px; line-height: 1.18; font-weight: 900; margin: 0 0 12px; letter-spacing: 0; }
  .app-sub { font-size: 18px; line-height: 1.45; color: #dbeafe; margin: 0; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 18px 0; }
  .metric { background: #fff; border: 1px solid #e5e7eb; border-radius: 18px; padding: 18px 10px; text-align: center; }
  .metric strong { display: block; font-size: 28px; color: #0f2b4d; }
  .metric span { display: block; margin-top: 5px; font-size: 12px; color: #64748b; font-weight: 700; }
  .list { display: grid; gap: 10px; margin-top: 20px; }
  .row { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; font-size: 18px; font-weight: 800; color: #172033; }
  .row small { color: #64748b; font-size: 14px; }
  .progress { height: 10px; background: #e5e7eb; border-radius: 99px; overflow: hidden; margin-bottom: 20px; }
  .progress span { display: block; height: 100%; width: 47%; background: linear-gradient(90deg, #0284c7, #f59e0b); }
  .question { background: #fff; border: 1px solid #e5e7eb; border-radius: 24px; padding: 28px; }
  .question h2 { margin: 0 0 18px; font-size: 30px; line-height: 1.26; letter-spacing: 0; }
  .choice { display: flex; gap: 13px; align-items: center; padding: 16px; border-radius: 16px; margin-top: 12px; background: #f8fafc; border: 1px solid #e5e7eb; font-size: 17px; font-weight: 750; }
  .dot { width: 16px; height: 16px; border-radius: 50%; background: #0284c7; }
  .result-head { display: grid; grid-template-columns: 138px 1fr; gap: 18px; align-items: center; }
  .rank { width: 138px; height: 138px; border-radius: 38px; background: linear-gradient(135deg, #0284c7, #0f2b4d); color: #fff; display: grid; place-items: center; font-size: 76px; font-weight: 950; box-shadow: 0 16px 38px rgba(2,132,199,.30); }
  .result-head h2 { margin: 0; font-size: 30px; line-height: 1.18; }
  .result-head p { margin: 8px 0 0; color: #64748b; font-weight: 700; font-size: 16px; }
  .chart { height: 250px; margin: 26px 0; display: grid; place-items: center; }
  .bars { display: grid; gap: 12px; }
  .bar { display: grid; grid-template-columns: 98px 1fr 52px; gap: 10px; align-items: center; font-size: 15px; font-weight: 850; }
  .track { height: 14px; background: #e5e7eb; border-radius: 99px; overflow: hidden; }
  .fill { height: 100%; background: linear-gradient(90deg, #0284c7, #f59e0b); }
  .screen-2 .phone .app, .screen-3 .phone .app { padding-top: 30px; }
  @media (orientation: portrait) {
    .canvas { padding: 5.6% 6%; }
    .stage { grid-template-columns: 1fr; grid-template-rows: auto 1fr; gap: 4%; }
    .copy { align-self: end; }
    h1 { font-size: clamp(70px, 11vw, 150px); margin-bottom: 26px; }
    .lead { font-size: clamp(31px, 4.2vw, 55px); }
    .label { font-size: clamp(28px, 3.6vw, 48px); margin-bottom: 22px; }
    .phone { width: min(78vw, 650px); align-self: start; }
  }
</style>
</head>
<body>
<main class="canvas screen-1">
  <section class="stage">
    <div class="copy">
      <div class="label">ブラック企業診断</div>
      <h1>職場リスクを<br>55問で見える化</h1>
      <p class="lead">残業、給与、休暇、人間関係、経営体質まで。働き方の違和感を、冷静に整理できます。</p>
    </div>
    <div class="phone">
      <div class="phone-inner">
        <div class="status"><span>9:41</span><span>5G 100%</span></div>
        <div class="app">
          <div class="hero-card">
            <p class="app-title">ブラック企業診断</p>
            <p class="app-sub">10カテゴリ・全55問の本格チェック</p>
          </div>
          <div class="metrics">
            <div class="metric"><strong>10</strong><span>カテゴリ</span></div>
            <div class="metric"><strong>55</strong><span>質問</span></div>
            <div class="metric"><strong>S-F</strong><span>判定</span></div>
          </div>
          <div class="list">
            <div class="row">残業・労働時間 <small>6問</small></div>
            <div class="row">給与・待遇 <small>5問</small></div>
            <div class="row">休暇・有給 <small>5問</small></div>
            <div class="row">ハラスメント <small>6問</small></div>
            <div class="row">経営体質 <small>6問</small></div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
<script>
  const params = new URLSearchParams(location.search);
  const screen = params.get("screen") || "1";
  document.querySelector(".canvas").className = `canvas screen-${screen}`;
  const data = {
    "2": {
      label: "5段階で回答",
      title: "面接前にも<br>現職の見直しにも",
      lead: "専門用語を抑えた質問で、日々の違和感をそのままチェック。",
      app: "question"
    },
    "3": {
      label: "結果を整理",
      title: "ランクとチャートで<br>弱点が見える",
      lead: "総合判定、カテゴリ別スコア、レーダーチャート、改善ヒントまで確認できます。",
      app: "result"
    }
  };
  if (data[screen]) {
    document.querySelector(".label").textContent = data[screen].label;
    document.querySelector("h1").innerHTML = data[screen].title;
    document.querySelector(".lead").textContent = data[screen].lead;
    const app = document.querySelector(".app");
    if (data[screen].app === "question") {
      app.innerHTML = `
        <div class="progress"><span></span></div>
        <div class="question">
          <div class="row" style="margin-bottom:18px;">残業・労働時間 <small>25 / 55</small></div>
          <h2>月の残業時間はどのくらいですか？</h2>
          <div class="choice"><span class="dot" style="background:#16a34a"></span>ほぼゼロ、または月10時間未満</div>
          <div class="choice"><span class="dot" style="background:#0284c7"></span>月10〜30時間程度</div>
          <div class="choice"><span class="dot" style="background:#f59e0b"></span>月45時間を超えることがある</div>
          <div class="choice"><span class="dot" style="background:#ef4444"></span>長時間残業が常態化している</div>
        </div>
        <div class="list">
          <div class="row">給与・待遇 <small>次のカテゴリ</small></div>
          <div class="row">休暇・有給 <small>5問</small></div>
        </div>`;
    }
    if (data[screen].app === "result") {
      app.innerHTML = `
        <div class="result-head">
          <div class="rank">B</div>
          <div><h2>注意点あり。改善余地を確認</h2><p>総合スコア 68 / 100</p></div>
        </div>
        <div class="chart">
          <svg viewBox="0 0 240 240" width="240" height="240" aria-hidden="true">
            <g fill="none" stroke="#cbd5e1" stroke-width="2">
              <polygon points="120,20 215,89 179,201 61,201 25,89"/>
              <polygon points="120,48 188,98 162,178 78,178 52,98"/>
              <polygon points="120,76 161,107 145,154 95,154 79,107"/>
            </g>
            <polygon points="120,36 198,93 152,178 76,188 47,91" fill="rgba(2,132,199,.36)" stroke="#0284c7" stroke-width="5"/>
          </svg>
        </div>
        <div class="bars">
          <div class="bar"><span>残業</span><div class="track"><div class="fill" style="width:78%"></div></div><span>78</span></div>
          <div class="bar"><span>給与</span><div class="track"><div class="fill" style="width:64%"></div></div><span>64</span></div>
          <div class="bar"><span>休暇</span><div class="track"><div class="fill" style="width:52%"></div></div><span>52</span></div>
          <div class="bar"><span>経営</span><div class="track"><div class="fill" style="width:71%"></div></div><span>71</span></div>
          <div class="bar"><span>健康</span><div class="track"><div class="fill" style="width:58%"></div></div><span>58</span></div>
        </div>`;
    }
  }
</script>
</body>
</html>
